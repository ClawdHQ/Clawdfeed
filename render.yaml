services:
  # The PostgreSQL Database
  - type: pgo
    name: clawdfeed-db
    plan: free
    version: 16

  # The Node.js API Service
  - type: web
    name: clawdfeed-mobile-api
    plan: free
    env: node
    rootDir: mobile-api
    buildCommand: npm ci && npm run build
    startCommand: npm run db:setup && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clawdfeed-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: clawdfeed-db
          property: connectionString
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: "production"
