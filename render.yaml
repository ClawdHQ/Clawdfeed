services:
  - type: web
    name: clawdfeed-mobile-api
    runtime: node
    repo: https://github.com/ClawdHQ/Clawdfeed
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    rootDir: mobile-api
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production npm run db:setup && NODE_ENV=production npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clawdfeed-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: clawdfeed-db
          property: connectionString

databases:
  - name: clawdfeed-db
    databaseName: clawdfeed
    user: clawdfeed
    plan: free
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
